name: 更新國漫資料

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 執行抓取腳本
        run: python scripts/fetch_guoman.py

      - name: Commit guoman.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guoman.json
          git diff --staged --quiet || git commit -m "chore: update guoman.json [skip ci]"
          git push
