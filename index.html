<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#070b14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>玻璃書籤</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
</head>
<body>

  <!-- ── Background ── -->
  <video id="bg-video" autoplay muted loop playsinline></video>
  <div id="bg-overlay"></div>
  <div id="bg-orbs" aria-hidden="true">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
  </div>

  <!-- ── Header ── -->
  <header id="header">
    <div id="hdr-left">
      <span id="version-tag">v1.2.53</span>
      <button id="perf-btn" title="效能監控" aria-label="效能監控">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </button>
      <button id="lock-btn" title="私人群組" aria-label="解鎖私人群組">
        <svg id="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      </button>
    </div>
    <div id="search-wrap">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="search" placeholder="搜尋或輸入網址… （/ 鍵快速聚焦）" autocomplete="search" name="neocast-search" spellcheck="false">
      <button id="voice-btn" title="語音輸入" aria-label="語音搜尋">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
    </div>
    <div id="hdr-right">
      <button class="hdr-btn" id="edit-btn" title="編輯佈局">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
      <button class="hdr-btn" id="sync-btn" title="同步到雲端">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <g class="sync-cloud"><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></g>
          <g class="sync-arrow"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/></g>
        </svg>
      </button>
      <button class="hdr-btn" id="settings-btn" title="設定">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Edit Mode Banner (removed, done button now in header) ── -->

  <!-- ── Grid Overlay ── -->
  <div id="grid-overlay" class="hidden"></div>

  <!-- ── Widget Container ── -->
  <div id="wc"></div>

  <!-- ── Add Widget Panel (edit mode only) ── -->
  <div id="add-widget-panel" class="hidden"></div>

  <!-- ── Mobile Layout (shown only on small screens) ── -->
  <div id="mobile-layout"></div>

  <!-- ── Context Menu ── -->
  <div id="ctx" class="hidden">
    <div class="ctx-item" data-a="edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      編輯
    </div>
    <div class="ctx-item" data-a="move">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      移到群組
    </div>
    <div class="ctx-div"></div>
    <div class="ctx-item danger" data-a="delete">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
      刪除
    </div>
  </div>

  <!-- ── Modals ── -->

  <!-- Shortcut -->
  <div id="m-sc" class="modal hidden">
    <div class="mbox glass">
      <h3 id="m-sc-title">新增捷徑</h3>
      <label>名稱<input id="sc-name" type="search" autocomplete="off" name="neocast-sc-name" spellcheck="false" placeholder="例：Google"></label>
      <label>網址<input id="sc-url" type="url" autocomplete="off" name="neocast-sc-url" spellcheck="false" placeholder="https://google.com"></label>
      <label>
        自訂圖示網址 <span class="hint">（選填，留空自動抓取）</span>
        <input id="sc-icon" type="url" autocomplete="off" name="neocast-sc-icon" spellcheck="false" placeholder="https://example.com/icon.png">
      </label>
      <label>群組<select id="sc-grp"><option value="">無群組</option></select></label>
      <div class="mactions">
        <button class="bcx" data-m="m-sc">取消</button>
        <button class="bco" id="sc-ok">儲存</button>
      </div>
    </div>
  </div>

  <!-- Group -->
  <div id="m-grp" class="modal hidden">
    <div class="mbox glass">
      <h3>新增群組</h3>
      <label>群組名稱<input id="grp-name" type="search" autocomplete="off" name="neocast-grp-name" spellcheck="false" placeholder="工作、娛樂、學習…"></label>
      <div class="mactions">
        <button class="bcx" data-m="m-grp">取消</button>
        <button class="bco" id="grp-ok">建立</button>
      </div>
    </div>
  </div>

  <!-- Move -->
  <div id="m-mv" class="modal hidden">
    <div class="mbox glass">
      <h3>移到群組</h3>
      <div id="mv-list"></div>
      <div class="mactions">
        <button class="bcx" data-m="m-mv">取消</button>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div id="m-cfg" class="modal hidden">
    <div class="mbox glass wide">
      <h3>⚙ 設定</h3>

      <div class="cfg-sec">
        <div class="cfg-sec-title">🔄 GitHub Gist 同步</div>
        <label>
          Personal Access Token
          <input id="cfg-tok" type="text" autocomplete="new-password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" spellcheck="false">
          <span class="hint">Tokens (classic) → 只勾 gist · 僅存於本機</span>
        </label>
        <label>
          Gist ID <span class="hint">（第一次留空，會自動建立）</span>
          <input id="cfg-gid" type="search" autocomplete="off" name="neocast-gid" spellcheck="false" placeholder="首次儲存後自動填入">
        </label>
      <div class="cfg-sec">
        <div class="cfg-sec-title">🔧 進階</div>
        <button class="bsm danger" id="cfg-reset-layout">重置小工具佈局</button>
        <span class="hint">只清除小工具位置，不影響捷徑和設定</span>
        <button class="bsm" id="cfg-sync-now" style="margin-top:8px;">從雲端還原設定</button>
      </div>
      </div>

      <div class="cfg-sec">
        <div class="cfg-sec-title">📰 新聞設定</div>
        <label>
          Newsdata API Key
          <input id="cfg-gnewskey" type="text" autocomplete="new-password" placeholder="pub_e799d8..." spellcheck="false">
          <span class="hint">newsdata.io 申請，免費每天 200 次。未填則使用 Google News RSS</span>
        </label>
      </div>

      <div class="cfg-sec">
        <div class="cfg-sec-title">🎬 YouTube 設定</div>
        <label>
          API Key
          <input id="cfg-ytkey" type="text" autocomplete="new-password" placeholder="AIzaSy..." spellcheck="false">
          <span class="hint">Google Cloud Console 申請，免費額度每天 10,000 units</span>
        </label>
        <label>
          Google 帳號
          <button id="cfg-yt-login" class="cfg-yt-login-btn" type="button">連結 Google 帳號（按讚功能）</button>
          <span id="cfg-yt-login-status" class="hint"></span>
        </label>
      </div>


      <div class="cfg-sec">
        <div class="cfg-sec-title">👤 個人設定</div>
        <label>
          暱稱
          <input id="cfg-nickname" type="search" autocomplete="off" name="neocast-nickname" spellcheck="false">
        </label>
      </div>

      <div class="cfg-sec">
        <div class="cfg-sec-title">🌤 天氣設定</div>
        <label>
          城市名稱
          <input id="cfg-city" type="search" autocomplete="off" name="neocast-city" spellcheck="false" placeholder="台南">
          <span class="hint">顯示在時鐘問候語旁邊</span>
        </label>
        <div style="display:flex;gap:8px;align-items:center;margin-top:6px;">
          <button class="bsm" id="cfg-locate">📍 自動定位</button>
          <span id="cfg-locate-status" class="hint"></span>
        </div>
      </div>

      <div class="cfg-sec">
        <div class="cfg-sec-title">🎬 背景影片</div>
        <label>
          上傳 MP4 / WebM
          <input id="cfg-vid" type="file" accept="video/mp4,video/webm,video/*">
          <span class="hint">儲存於本機 IndexedDB，不會上傳至網路</span>
        </label>
        <button class="bsm danger" id="rm-vid">移除影片</button>
      </div>

      <div class="mactions">
        <button class="bcx" data-m="m-cfg">取消</button>
        <button class="bco" id="cfg-ok">儲存</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <!-- Honeypot: prevent browser password save prompts -->
  <input type="text" style="display:none" autocomplete="username">
  <input type="password" style="display:none" autocomplete="new-password">
  <script src="app.js"></script>
<!-- 效能監控面板（fixed，不影響排版） -->
<div id="perf-panel" class="hidden">
  <span id="perf-fps">FPS:--</span>
  <span id="perf-sep1"> | </span>
  <span id="perf-mem">MEM:--</span>
  <span id="perf-sep2"> | </span>
  <span id="perf-raf">rAF:--</span>
</div>

</body>
</html>
